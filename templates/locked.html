{% extends "base.html" %}
{% block title %}Locked{% endblock %}
{% block content %}
<div class="row min-vh-75 align-items-center justify-content-center">
    <div class="col-12 text-center">
        <i class="bi bi-lock-fill display-1 text-secondary mb-3"></i>
        <h2 class="text-secondary">Section Locked</h2>
        <p class="lead text-muted">Complete <strong>{{ SOC_SECTIONS[current_progress] }}</strong> first to unlock <strong>{{ section_name }}</strong>.</p>
        <a href="{{ SOC_ROUTES[current_progress] }}" class="btn btn-primary mt-3">
            <i class="bi bi-arrow-left"></i> Go to {{ SOC_SECTIONS[current_progress] }}
        </a>
    </div>
</div>
{% endblock %}
