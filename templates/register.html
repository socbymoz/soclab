<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Log Lab - Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        body {
            background: #0a0e14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }
        #logBackground {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 50%, #0d1b2a 0%, #0a0e14 70%);
        }
        .register-card {
            position: relative;
            z-index: 1;
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            margin: 40px auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: fadeInUp 0.8s ease-out;
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .register-card h1 { color: #0d6efd; font-weight: 700; }
        .register-card p { color: #9ca3af; }
        .form-control {
            background: #1a1d23;
            border: 1px solid #374151;
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.2);
        }
        .form-control::placeholder { color: #6b7280; }
        .form-control.is-invalid { border-color: #dc3545; }
        .form-control.is-valid { border-color: #198754; }
        .invalid-feedback { color: #f87171; font-size: 0.8rem; }
        .btn-primary {
            background: #0d6efd;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            transition: 0.2s;
        }
        .btn-primary:hover { background: #0b5ed7; transform: translateY(-1px); }
        .alert-error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #f87171;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.9rem;
        }
        .form-label { color: #9ca3af; font-size: 0.85rem; margin-bottom: 4px; }
        .input-group-custom {
            display: flex;
            gap: 8px;
        }
        .input-group-custom select {
            background: #1a1d23;
            border: 1px solid #374151;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            width: 110px;
            flex-shrink: 0;
        }
        .input-group-custom select:focus {
            border-color: #0d6efd;
            outline: none;
        }
        .input-group-custom input {
            flex: 1;
        }
        .country-hint {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 4px;
            display: none;
        }
        .country-hint.show { display: block; }
    </style>
</head>
<body>
    <div id="logBackground"></div>

    <div class="register-card">
        <div class="text-center mb-3">
            <i class="bi bi-shield-shaded display-5 text-primary"></i>
            <h1 class="mt-2">Create Account</h1>
            <p>Fill in your details to get started</p>
        </div>

        {% if error %}
        <div class="alert-error mb-3"><i class="bi bi-exclamation-triangle me-2"></i>{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register">
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-person me-1"></i>Full Name</label>
                <input type="text" class="form-control" name="name" placeholder="e.g. John Doe" required>
            </div>
            <div class="row mb-3">
                <div class="col-6">
                    <label class="form-label"><i class="bi bi-cake me-1"></i>Age</label>
                    <input type="number" class="form-control" name="age" placeholder="e.g. 25" min="1" max="150" required>
                </div>
                <div class="col-6">
                    <label class="form-label"><i class="bi bi-envelope me-1"></i>Email</label>
                    <input type="email" class="form-control" name="email" placeholder="example@gmail.com" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-telephone me-1"></i>Phone Number <small class="text-secondary">(with country code)</small></label>
                <div class="input-group-custom">
                    <select id="countryCode" name="country_code" onchange="updatePhoneHint()" required>
                        <option value="">Code</option>
                        <option value="+1">US/CA +1</option>
                        <option value="+44">UK +44</option>
                        <option value="+61">AU +61</option>
                        <option value="+91">IN +91</option>
                        <option value="+81">JP +81</option>
                        <option value="+49">DE +49</option>
                        <option value="+33">FR +33</option>
                        <option value="+39">IT +39</option>
                        <option value="+55">BR +55</option>
                        <option value="+7">RU +7</option>
                        <option value="+86">CN +86</option>
                        <option value="+82">KR +82</option>
                        <option value="+65">SG +65</option>
                        <option value="+971">AE +971</option>
                        <option value="+966">SA +966</option>
                        <option value="+27">ZA +27</option>
                        <option value="+52">MX +52</option>
                        <option value="+63">PH +63</option>
                        <option value="+62">ID +62</option>
                        <option value="+64">NZ +64</option>
                    </select>
                    <input type="tel" class="form-control" name="phone" placeholder="Phone number after code" pattern="\d{6,15}" required>
                </div>
                <div id="phoneHint" class="country-hint"></div>
            </div>
            <hr class="text-secondary">
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-person-badge me-1"></i>Username</label>
                <input type="text" class="form-control" name="username" placeholder="e.g. analyst-01" required>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
                <input type="password" class="form-control" name="password" placeholder="Choose a strong password" minlength="4" required>
            </div>
            <button type="submit" class="btn btn-primary mb-2">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
        </form>

        <div class="text-center mt-3">
            <small class="text-secondary">Already have an account? <a href="/login" class="text-primary text-decoration-none">Sign In</a></small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const phoneFormats = {
            '+1': { country: 'US/Canada', format: '+1 XXX XXX XXXX (10 digits)' },
            '+44': { country: 'UK', format: '+44 XXXX XXXXXX (10-11 digits)' },
            '+61': { country: 'Australia', format: '+61 X XXXX XXXX (9 digits)' },
            '+91': { country: 'India', format: '+91 XXXXX XXXXX (10 digits)' },
            '+81': { country: 'Japan', format: '+81 XX XXXX XXXX (10-11 digits)' },
            '+49': { country: 'Germany', format: '+49 XXXX XXXXXXX (10-11 digits)' },
            '+33': { country: 'France', format: '+33 X XX XX XX XX (9 digits)' },
            '+39': { country: 'Italy', format: '+39 XXX XXXXXXX (9-10 digits)' },
            '+55': { country: 'Brazil', format: '+55 XX XXXXX XXXX (10-11 digits)' },
            '+86': { country: 'China', format: '+86 XXX XXXX XXXX (11 digits)' },
            '+82': { country: 'South Korea', format: '+82 XX XXXX XXXX (9-10 digits)' },
            '+65': { country: 'Singapore', format: '+65 XXXX XXXX (8 digits)' },
            '+971': { country: 'UAE', format: '+971 XX XXX XXXX (9 digits)' },
            '+966': { country: 'Saudi Arabia', format: '+966 XX XXX XXXX (9 digits)' },
            '+27': { country: 'South Africa', format: '+27 XX XXX XXXX (9 digits)' },
            '+52': { country: 'Mexico', format: '+52 XX XXXX XXXX (10 digits)' },
            '+63': { country: 'Philippines', format: '+63 XXX XXX XXXX (10 digits)' },
            '+62': { country: 'Indonesia', format: '+62 XX XXXX XXXX (9-11 digits)' },
            '+64': { country: 'New Zealand', format: '+64 XX XXX XXXX (8-10 digits)' },
            '+7': { country: 'Russia', format: '+7 XXX XXX XX XX (10 digits)' },
        };

        function updatePhoneHint() {
            const code = document.getElementById('countryCode').value;
            const hint = document.getElementById('phoneHint');
            if (code && phoneFormats[code]) {
                hint.textContent = phoneFormats[code].country + ' — expected: ' + phoneFormats[code].format;
                hint.className = 'country-hint show';
            } else {
                hint.className = 'country-hint';
            }
        }

        document.querySelector('form').addEventListener('submit', function(e) {
            const code = document.getElementById('countryCode').value;
            const number = document.querySelector('input[name="phone"]').value;
            if (!code) {
                e.preventDefault();
                alert('Please select your country code.');
                return;
            }
            if (!number.match(/^\d{6,15}$/)) {
                e.preventDefault();
                alert('Please enter a valid phone number (6-15 digits after country code).');
                return;
            }
            // Combine country code + number into the phone field
            document.querySelector('input[name="phone"]').value = code + ' ' + number;
        });
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
