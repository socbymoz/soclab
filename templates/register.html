<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Log Lab - Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        body {
            background: #0a0e14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }
        #logBackground {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 50%, #0d1b2a 0%, #0a0e14 70%);
        }
        .register-card {
            position: relative;
            z-index: 1;
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            margin: 40px auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: fadeInUp 0.8s ease-out;
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .register-card h1 { color: #0d6efd; font-weight: 700; }
        .register-card p { color: #9ca3af; }
        .form-control {
            background: #1a1d23;
            border: 1px solid #374151;
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.2);
        }
        .form-control::placeholder { color: #6b7280; }
        .btn-primary {
            background: #0d6efd;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            transition: 0.2s;
        }
        .btn-primary:hover { background: #0b5ed7; transform: translateY(-1px); }
        .alert-error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #f87171;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.9rem;
        }
        .form-label { color: #9ca3af; font-size: 0.85rem; margin-bottom: 4px; }
        .input-icon { position: relative; }
        .input-icon i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            z-index: 10;
        }
        .input-icon .form-control { padding-left: 40px; }
    </style>
</head>
<body>
    <div id="logBackground"></div>

    <div class="register-card">
        <div class="text-center mb-3">
            <i class="bi bi-shield-shaded display-5 text-primary"></i>
            <h1 class="mt-2">Create Account</h1>
            <p>Fill in your details to get started</p>
        </div>

        {% if error %}
        <div class="alert-error mb-3"><i class="bi bi-exclamation-triangle me-2"></i>{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register">
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-person me-1"></i>Full Name</label>
                <input type="text" class="form-control" name="name" placeholder="e.g. John Doe" required>
            </div>
            <div class="row mb-3">
                <div class="col-6">
                    <label class="form-label"><i class="bi bi-cake me-1"></i>Age</label>
                    <input type="number" class="form-control" name="age" placeholder="e.g. 25" min="1" max="150" required>
                </div>
                <div class="col-6">
                    <label class="form-label"><i class="bi bi-envelope me-1"></i>Email</label>
                    <input type="email" class="form-control" name="email" placeholder="you@example.com" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-telephone me-1"></i>Phone Number</label>
                <input type="tel" class="form-control" name="phone" placeholder="e.g. +1 555-1234" required>
            </div>
            <hr class="text-secondary">
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-person-badge me-1"></i>Username</label>
                <input type="text" class="form-control" name="username" placeholder="e.g. analyst-01" required>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
                <input type="password" class="form-control" name="password" placeholder="Choose a strong password" minlength="4" required>
            </div>
            <button type="submit" class="btn btn-primary mb-2">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
        </form>

        <div class="text-center mt-3">
            <small class="text-secondary">Already have an account? <a href="/login" class="text-primary text-decoration-none">Sign In</a></small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
