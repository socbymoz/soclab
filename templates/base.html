<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Lab - {% block title %}Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background:#0a0e14;color:#e5e7eb;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;">

<canvas id="fluidCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,#0d1b2a 0%,#0a0e14 70%);"></canvas>

<button id="sidebarToggle" onclick="toggleSidebar()" style="position:fixed;top:16px;left:16px;z-index:1001;background:rgba(0,20,40,0.8);border:1px solid rgba(0,180,255,0.4);color:#00d4ff;width:40px;height:40px;border-radius:10px;cursor:pointer;transition:.3s;box-shadow:0 0 10px rgba(0,180,255,0.15),inset 0 0 10px rgba(0,180,255,0.05);" onmouseover="this.style.borderColor='rgba(0,200,255,0.8)';this.style.boxShadow='0 0 20px rgba(0,180,255,0.3),inset 0 0 15px rgba(0,180,255,0.1)';this.style.color='#00eeff'" onmouseout="this.style.borderColor='rgba(0,180,255,0.4)';this.style.boxShadow='0 0 10px rgba(0,180,255,0.15),inset 0 0 10px rgba(0,180,255,0.05)';this.style.color='#00d4ff'">
    <i class="bi bi-three-dots-vertical"></i>
</button>

<div id="sidebar" style="position:fixed;top:0;left:-280px;width:260px;height:100%;z-index:1002;background:rgba(8,12,20,0.97);border-right:1px solid rgba(0,180,255,0.2);padding:20px;overflow-y:auto;transition:.3s;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="mb-0" style="color:#00d4ff;"><i class="bi bi-shield-shaded me-2"></i>SOC Lab</h6>
        <button onclick="toggleSidebar()" class="btn btn-sm" style="color:#00d4ff;border-color:rgba(0,180,255,0.3);"><i class="bi bi-x-lg"></i></button>
    </div>
    <hr style="border-color:rgba(0,180,255,0.15);">
    <a href="/" class="d-block py-2 px-2 rounded text-decoration-none" style="transition:.2s;color:#8098a8;" onmouseover="this.style.background='rgba(0,180,255,0.1)';this.style.color='#00d4ff'" onmouseout="this.style.background='transparent';this.style.color='#8098a8'"><i class="bi bi-house-door me-2"></i>Dashboard</a>
    <div class="mt-3 mb-1 px-2"><small style="color:rgba(0,180,255,0.5);">CURRICULUM (25 TOPICS)</small></div>
    {% for t in CURRICULUM %}
    <a href="/topic/{{ t.id }}" class="d-block py-2 px-2 mb-1 rounded text-decoration-none small" style="transition:.2s;{% if topic is defined and topic.id == t.id %}color:#00d4ff;border-left:2px solid #00d4ff;padding-left:6px;{% else %}color:#8098a8;border-left:2px solid transparent;{% endif %}" onmouseover="this.style.background='rgba(0,180,255,0.1)';this.style.color='#00d4ff'" onmouseout="this.style.background='transparent';{% if topic is defined and topic.id == t.id %}this.style.color='#00d4ff'{% else %}this.style.color='#8098a8'{% endif %}">
        <i class="{{ t.icon }} me-2 text-{{ t.color }}" style="font-size:0.75rem;"></i>{{ t.title }}
    </a>
    {% endfor %}
</div>

<div id="sidebarOverlay" onclick="toggleSidebar()" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;display:none;background:rgba(0,0,0,0.5);"></div>

<a href="https://github.com/socbymoz" target="_blank" class="text-decoration-none" style="position:fixed;bottom:16px;right:16px;z-index:1000;background:rgba(0,20,40,0.8);border:1px solid rgba(0,180,255,0.3);color:rgba(0,200,255,0.7);padding:8px 14px;border-radius:20px;font-size:0.8rem;transition:.3s;box-shadow:0 0 8px rgba(0,180,255,0.1);" onmouseover="this.style.borderColor='rgba(0,200,255,0.6)';this.style.color='#00eeff';this.style.boxShadow='0 0 15px rgba(0,180,255,0.25)'" onmouseout="this.style.borderColor='rgba(0,180,255,0.3)';this.style.color='rgba(0,200,255,0.7)';this.style.boxShadow='0 0 8px rgba(0,180,255,0.1)'">
    <i class="bi bi-github me-1"></i>Built by socbymoz
</a>

<div class="main-content" style="position:relative;z-index:1;padding:20px;max-width:900px;margin:0 auto;">
    {% block content %}{% endblock %}
</div>

<style>
canvas { display: block; }
.btn-outline-primary {
    border-color: rgba(0,180,255,0.5) !important;
    color: #00d4ff !important;
    background: transparent !important;
    transition: .3s !important;
}
.btn-outline-primary:hover {
    background: rgba(0,180,255,0.15) !important;
    border-color: #00d4ff !important;
    box-shadow: 0 0 15px rgba(0,180,255,0.2) !important;
}
.btn-outline-secondary {
    border-color: rgba(100,120,150,0.4) !important;
    color: #8098a8 !important;
    transition: .3s !important;
}
.btn-outline-secondary:hover {
    border-color: rgba(0,180,255,0.4) !important;
    color: #00d4ff !important;
    background: rgba(0,180,255,0.08) !important;
}
.btn-outline-warning {
    border-color: rgba(255,200,0,0.4) !important;
    color: #ffd700 !important;
    transition: .3s !important;
}
.btn-outline-warning:hover {
    background: rgba(255,200,0,0.1) !important;
    border-color: #ffd700 !important;
    box-shadow: 0 0 12px rgba(255,200,0,0.15) !important;
}
#quizContainer .btn {
    border-color: rgba(0,180,255,0.2) !important;
    color: #c0d0e0 !important;
    transition: .3s !important;
}
#quizContainer .btn:hover {
    border-color: rgba(0,200,255,0.5) !important;
    background: rgba(0,180,255,0.08) !important;
}
a.text-primary {
    color: #00d4ff !important;
}
.badge.bg-secondary {
    background: rgba(0,180,255,0.15) !important;
    color: #00d4ff !important;
}
pre {
    border-color: rgba(0,180,255,0.15) !important;
}
.alert {
    border: 1px solid rgba(0,180,255,0.2) !important;
}
.alert-info {
    background: rgba(0,120,200,0.1) !important;
    border-color: rgba(0,180,255,0.25) !important;
    color: #80d0ff !important;
}
.alert-success {
    background: rgba(0,200,100,0.08) !important;
    border-color: rgba(0,200,100,0.2) !important;
    color: #80e0a0 !important;
}
.alert-warning {
    background: rgba(255,200,0,0.08) !important;
    border-color: rgba(255,200,0,0.2) !important;
    color: #ffd080 !important;
}
.alert-danger {
    background: rgba(255,60,60,0.08) !important;
    border-color: rgba(255,60,60,0.2) !important;
    color: #ff8080 !important;
}
.progress {
    background: rgba(0,180,255,0.08) !important;
}
.text-success {
    color: #00d48a !important;
}
.text-warning {
    color: #ffd700 !important;
}
.text-danger {
    color: #ff6060 !important;
}
.text-info {
    color: #80d0ff !important;
}
.text-primary {
    color: #00d4ff !important;
}
.quiz-btn:disabled {
    opacity: 0.8 !important;
    cursor: default !important;
}
</style>
<script>
function toggleSidebar() {
    const s = document.getElementById('sidebar');
    const o = document.getElementById('sidebarOverlay');
    if (s.style.left === '0px') {
        s.style.left = '-280px';
        o.style.display = 'none';
    } else {
        s.style.left = '0px';
        o.style.display = 'block';
    }
}

// 3D Globe — cybersecurity network visualization
(function() {
    const canvas = document.getElementById('fluidCanvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let mx = -1000, my = -1000;
    window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    window.addEventListener('touchmove', e => { if (e.touches.length) { mx = e.touches[0].clientX; my = e.touches[0].clientY; } }, { passive: true });
    
    const cities = [
        { name:'NYC', lat:40.7, lon:-74.0, r:255, g:100, b:50 },
        { name:'London', lat:51.5, lon:-0.1, r:50, g:180, b:255 },
        { name:'Tokyo', lat:35.7, lon:139.7, r:0, g:220, b:200 },
        { name:'Singapore', lat:1.3, lon:103.8, r:100, g:200, b:255 },
        { name:'Sydney', lat:-33.9, lon:151.2, r:150, g:80, b:220 },
        { name:'Moscow', lat:55.8, lon:37.6, r:200, g:60, b:80 },
        { name:'Dubai', lat:25.2, lon:55.3, r:255, g:180, b:50 },
        { name:'SaoPaulo', lat:-23.5, lon:-46.6, r:50, g:200, b:150 },
        { name:'Johannesburg', lat:-26.2, lon:28.0, r:255, g:100, b:80 },
        { name:'SanFrancisco', lat:37.8, lon:-122.4, r:0, g:180, b:255 },
    ];
    const conns = [[0,1],[0,2],[0,7],[1,5],[1,6],[2,3],[2,4],[3,6],[3,8],[4,9],[5,6],[6,8],[9,2],[9,0]];
    
    let angle = 0, particleTime = 0;
    let particles = [], R, cx, cy;
    
    function to3D(lat, lon) {
        const p = lat * Math.PI / 180, t = lon * Math.PI / 180;
        return { x: Math.cos(p) * Math.cos(t), y: Math.sin(p), z: Math.cos(p) * Math.sin(t) };
    }
    function rotY(p, a) {
        const c = Math.cos(a), s = Math.sin(a);
        return { x: p.x * c - p.z * s, y: p.y, z: p.x * s + p.z * c };
    }
    
    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        R = Math.min(W, H) * 0.35;
        cx = W * 0.55; cy = H * 0.5;
    }
    
    function spawnParticle() {
        const ci = Math.floor(Math.random() * conns.length);
        const [a, b] = conns[ci];
        particles.push({ src: a, dst: b, t: 0, speed: 0.003 + Math.random() * 0.004 });
    }
    
    function step(time) {
        if (!time) time = 0;
        const dt = Math.min(time - (particleTime || time), 50);
        particleTime = time;
        angle += 0.002 * (dt / 16);
        
        ctx.clearRect(0, 0, W, H);
        
        // Background gradient
        const bg = ctx.createRadialGradient(W*0.5, H*0.5, 0, W*0.5, H*0.5, H*0.9);
        bg.addColorStop(0, 'rgba(8,16,30,1)');
        bg.addColorStop(0.5, 'rgba(6,12,24,1)');
        bg.addColorStop(1, 'rgba(4,8,16,1)');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);
        
        // Subtle grid
        ctx.strokeStyle = 'rgba(0, 180, 255, 0.03)';
        ctx.lineWidth = 1;
        const gs = 60;
        for (let x = 0; x < W; x += gs) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        }
        for (let y = 0; y < H; y += gs) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }
        
        // Globe
        const globeR = R;
        const c3d = cities.map(c => rotY(to3D(c.lat, c.lon), angle));
        const pts = c3d.map(p => ({ x: cx + p.x * globeR, y: cy - p.y * globeR, z: p.z }));
        
        // Outer glow
        const grd = ctx.createRadialGradient(cx, cy, globeR*0.8, cx, cy, globeR*1.3);
        grd.addColorStop(0, 'rgba(0,180,255,0)');
        grd.addColorStop(0.5, 'rgba(0,120,255,0.02)');
        grd.addColorStop(0.8, 'rgba(0,80,255,0.06)');
        grd.addColorStop(1, 'rgba(0,60,255,0)');
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(cx, cy, globeR*1.3, 0, Math.PI*2); ctx.fill();
        
        // Holographic ring 1
        ctx.strokeStyle = 'rgba(0, 180, 255, 0.12)';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.ellipse(cx, cy, globeR*1.15, globeR*0.15, 0, 0, Math.PI*2); ctx.stroke();
        
        // Holographic ring 2
        ctx.strokeStyle = 'rgba(100, 120, 255, 0.08)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.ellipse(cx, cy + globeR*1.0, globeR*1.1, globeR*0.1, 0.2, 0, Math.PI*2); ctx.stroke();
        
        // Lat/Long lines
        ctx.strokeStyle = 'rgba(0, 180, 255, 0.06)';
        ctx.lineWidth = 0.8;
        for (let lat = -75; lat <= 75; lat += 15) {
            const steps = 40;
            ctx.beginPath();
            for (let j = 0; j <= steps; j++) {
                const lon = (j / steps) * 360 - 180;
                const p = rotY(to3D(lat, lon), angle);
                const sx = cx + p.x * globeR, sy = cy - p.y * globeR;
                if (p.z > -0.1) {
                    j === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
                }
            }
            ctx.stroke();
        }
        for (let lon = -150; lon <= 150; lon += 30) {
            const steps = 40;
            ctx.beginPath();
            for (let j = 0; j <= steps; j++) {
                const lat = (j / steps) * 150 - 75;
                const p = rotY(to3D(lat, lon), angle);
                const sx = cx + p.x * globeR, sy = cy - p.y * globeR;
                if (p.z > -0.1) {
                    j === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
                }
            }
            ctx.stroke();
        }
        
        // Connections (front-facing only)
        for (const [ai, bi] of conns) {
            const pa = pts[ai], pb = pts[bi];
            if (pa.z < 0.05 && pb.z < 0.05) continue;
            
            const mouseDist = Math.min(
                Math.sqrt((pa.x-mx)**2 + (pa.y-my)**2),
                Math.sqrt((pb.x-mx)**2 + (pb.y-my)**2)
            );
            const glow = Math.max(0.2, 1 - mouseDist / 250);
            
            const midX = (pa.x + pb.x) / 2;
            const midY = (pa.y + pb.y) / 2;
            const dx = pb.x - pa.x, dy = pb.y - pa.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const nx = -dy / dist, ny = dx / dist;
            const arcH = dist * 0.35;
            
            ctx.beginPath();
            ctx.moveTo(pa.x, pa.y);
            ctx.quadraticCurveTo(midX + nx * arcH, midY + ny * arcH, pb.x, pb.y);
            ctx.strokeStyle = `rgba(0, 180, 255, ${0.08 * glow})`;
            ctx.lineWidth = 1.2 * glow;
            ctx.stroke();
            
            // Glow overlay for connection
            ctx.beginPath();
            ctx.moveTo(pa.x, pa.y);
            ctx.quadraticCurveTo(midX + nx * arcH, midY + ny * arcH, pb.x, pb.y);
            ctx.strokeStyle = `rgba(0, 200, 255, ${0.03 * glow})`;
            ctx.lineWidth = 4 * glow;
            ctx.stroke();
        }
        
        // Nodes
        for (let i = 0; i < cities.length; i++) {
            const p = pts[i], c = cities[i];
            if (p.z < 0) continue;
            const mouseDist = Math.sqrt((p.x-mx)**2 + (p.y-my)**2);
            const glow = Math.max(1, 1 - mouseDist / 200);
            
            ctx.shadowColor = `rgba(${c.r},${c.g},${c.b},${0.6 * glow})`;
            ctx.shadowBlur = 12 * glow;
            ctx.beginPath(); ctx.arc(p.x, p.y, 2.5 * glow, 0, Math.PI*2);
            ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${0.9})`;
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.beginPath(); ctx.arc(p.x, p.y, 5 * glow, 0, Math.PI*2);
            ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${0.15 * glow})`;
            ctx.fill();
        }
        
        // Particles flowing along connections
        particleTime = time;
        if (Math.random() < 0.1) spawnParticle();
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.t += p.speed * (dt / 16);
            if (p.t >= 1) { particles.splice(i, 1); continue; }
            
            const pa = pts[p.src], pb = pts[p.dst];
            if (pa.z < 0 && pb.z < 0) continue;
            
            const mx2 = (pa.x + pb.x) / 2, my2 = (pa.y + pb.y) / 2;
            const dx2 = pb.x - pa.x, dy2 = pb.y - pa.y;
            const dist2 = Math.sqrt(dx2*dx2 + dy2*dy2);
            const nx2 = -dy2 / dist2, ny2 = dx2 / dist2;
            const arcH2 = dist2 * 0.35;
            const t = p.t;
            const qx = (1-t)*(1-t)*pa.x + 2*(1-t)*t*(mx2 + nx2*arcH2) + t*t*pb.x;
            const qy = (1-t)*(1-t)*pa.y + 2*(1-t)*t*(my2 + ny2*arcH2) + t*t*pb.y;
            
            const mouseDist2 = Math.sqrt((qx-mx)**2 + (qy-my)**2);
            const glow2 = Math.max(1, 1 - mouseDist2 / 200);
            
            ctx.shadowColor = `rgba(0, 200, 255, ${0.5 * glow2})`;
            ctx.shadowBlur = 8 * glow2;
            ctx.beginPath(); ctx.arc(qx, qy, 1.8 * glow2, 0, Math.PI*2);
            ctx.fillStyle = `rgba(0, 220, 255, ${0.7 * glow2})`;
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Mouse pulse ring
        if (mx > 0 && my > 0 && mx < W && my < H) {
            const pulseR = 25 + Math.sin(time * 0.003) * 8;
            ctx.beginPath(); ctx.arc(mx, my, pulseR, 0, Math.PI*2);
            ctx.strokeStyle = `rgba(0, 200, 255, ${0.08 + Math.sin(time * 0.003) * 0.03})`;
            ctx.lineWidth = 1; ctx.stroke();
            
            ctx.beginPath(); ctx.arc(mx, my, pulseR * 2, 0, Math.PI*2);
            ctx.strokeStyle = `rgba(0, 180, 255, ${0.03 + Math.sin(time * 0.003) * 0.015})`;
            ctx.lineWidth = 0.5; ctx.stroke();
        }
        
        // Floating data particles
        for (let i = 0; i < 30; i++) {
            const fx = (Math.sin(i * 127.1 + time * 0.0003) * 0.5 + 0.5) * W;
            const fy = (Math.sin(i * 311.7 + time * 0.0002) * 0.5 + 0.5) * H;
            const distM = Math.sqrt((fx-mx)**2 + (fy-my)**2);
            const alpha = (0.02 + Math.sin(time * 0.001 + i) * 0.01) * Math.max(0.5, 1 - distM/300);
            if (alpha < 0.01) continue;
            ctx.beginPath(); ctx.arc(fx, fy, 0.8, 0, Math.PI*2);
            ctx.fillStyle = `rgba(0, 180, 255, ${alpha})`;
            ctx.fill();
        }
        
        requestAnimationFrame(step);
    }
    
    resize();
    window.addEventListener('resize', resize);
    requestAnimationFrame(step);
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
