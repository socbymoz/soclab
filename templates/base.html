<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Log Lab - {% block title %}Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

    <div id="logBackground"></div>

    <button id="sidebarToggle" onclick="toggleSidebar()">
        <i class="bi bi-three-dots-vertical"></i>
    </button>

    <div id="sidebar" class="closed">
        <div class="sidebar-header">
            <h5><i class="bi bi-shield-shaded"></i> SOC Lab</h5>
            <button class="btn btn-sm text-light" onclick="toggleSidebar()"><i class="bi bi-x-lg"></i></button>
        </div>
        <hr class="text-secondary">
        <a href="/" class="sidebar-item"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/logs/windows" class="sidebar-item"><i class="bi bi-windows"></i> Windows Events</a>
        <a href="/logs/web" class="sidebar-item"><i class="bi bi-globe"></i> Web Server</a>
        <a href="/logs/firewall" class="sidebar-item"><i class="bi bi-shield"></i> Firewall</a>
        <a href="/logs/ssh" class="sidebar-item"><i class="bi bi-terminal"></i> SSH Auth</a>
        <a href="/logs/sysmon" class="sidebar-item"><i class="bi bi-cpu"></i> Sysmon</a>
        <a href="/learning" class="sidebar-item"><i class="bi bi-book"></i> Learn</a>
        <a href="/exercises" class="sidebar-item"><i class="bi bi-puzzle"></i> Quizzes</a>
        <hr class="text-secondary">
        <div class="sidebar-footer text-secondary small px-3">
            SOC Log Lab v1.0<br>
            All data simulated
        </div>
    </div>

    <div id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer mt-5 py-3 bg-dark text-light text-center">
        <div class="container">
            <small></small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
