<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Lab - {% block title %}Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background:#0a0e14;color:#e5e7eb;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;">

<div id="logBackground" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden;background:radial-gradient(ellipse at 50% 0%,#0d1b2a 0%,#0a0e14 70%);"></div>

<button id="sidebarToggle" onclick="toggleSidebar()" style="position:fixed;top:16px;left:16px;z-index:1001;background:rgba(17,24,39,0.7);border:1px solid #374151;color:#9ca3af;width:40px;height:40px;border-radius:10px;cursor:pointer;transition:.2s;">
    <i class="bi bi-three-dots-vertical"></i>
</button>

<div id="sidebar" style="position:fixed;top:0;left:-280px;width:260px;height:100%;z-index:1002;background:rgba(13,17,23,0.98);border-right:1px solid #1f2937;padding:20px;overflow-y:auto;transition:.3s;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="mb-0 text-primary"><i class="bi bi-shield-shaded me-2"></i>SOC Lab</h6>
        <button class="btn btn-sm text-secondary" onclick="toggleSidebar()"><i class="bi bi-x-lg"></i></button>
    </div>
    <hr class="text-secondary">
    <a href="/" class="d-block py-2 px-2 rounded text-decoration-none text-light" style="transition:.2s;" onmouseover="this.style.background='#1f2937'" onmouseout="this.style.background='transparent'"><i class="bi bi-house-door me-2"></i>Dashboard</a>
    <div class="mt-3 mb-1 px-2"><small class="text-secondary">SOC FLOW</small></div>
    {% for i in range(8) %}
    <a href="{{ SOC_ROUTES[i] }}" class="d-block py-2 px-2 rounded text-decoration-none {% if section_idx is defined and i == section_idx %}text-primary fw-bold{% else %}text-light{% endif %}" style="transition:.2s;" onmouseover="this.style.background='#1f2937'" onmouseout="this.style.background='transparent'">
        <i class="bi bi-chevron-right me-2" style="font-size:0.7rem;"></i>{{ SOC_SECTIONS[i] }}
    </a>
    {% endfor %}
    <hr class="text-secondary">
    <a href="https://github.com/socbymoz" target="_blank" class="d-block py-2 px-2 rounded text-decoration-none text-secondary small" style="transition:.2s;" onmouseover="this.style.background='#1f2937'" onmouseout="this.style.background='transparent'">
        <i class="bi bi-github me-2"></i>Built by socbymoz
    </a>
</div>

<div id="sidebarOverlay" onclick="toggleSidebar()" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;display:none;background:rgba(0,0,0,0.5);"></div>

<div class="main-content" style="position:relative;z-index:1;padding:20px;max-width:900px;margin:0 auto;">
    {% block content %}{% endblock %}
</div>

<script>
function toggleSidebar() {
    const s = document.getElementById('sidebar');
    const o = document.getElementById('sidebarOverlay');
    if (s.style.left === '0px') {
        s.style.left = '-280px';
        o.style.display = 'none';
    } else {
        s.style.left = '0px';
        o.style.display = 'block';
    }
}
function initLogBackground() {
    const c = document.getElementById('logBackground');
    const lines = [
        '2026-06-15 08:12:34 [INFO] Event ID 4624 Logon success',
        '2026-06-15 08:15:22 [WARN] Event ID 4625 Failed logon attempt',
        '2026-06-15 08:16:10 [WARN] Event ID 4625 Failed logon attempt',
        '2026-06-15 09:00:12 [INFO] Event ID 4720 User created: backup_admin',
        '2026-06-15 09:15:44 [CRIT] Event ID 4688 Process: cmd.exe',
        '2026-06-15 09:25:30 [HIGH] Firewall: outbound to 34.253.159.159:4444',
        '2026-06-15 10:00:00 [CRIT] Event ID 1102 Audit log cleared',
        '--- SOC Lab Simulation ---',
        '2026-06-15 06:05:01 [WARN] SSH Failed: admin from 45.33.32.156',
        '2026-06-15 06:15:00 [CRIT] SSH Access GRANTED: stansimon',
        '2026-06-15 09:02:00 [CRIT] Sysmon: C2 beacon to 34.253.159.159',
        '2026-06-15 09:20:00 [HIGH] Registry: persistence installed',
    ];
    for (let i = 0; i < 20; i++) {
        const d = document.createElement('div');
        d.textContent = lines[i % lines.length];
        d.style.cssText = `position:absolute;left:${Math.random()*60}%;font-family:monospace;font-size:0.65rem;color:rgba(13,110,253,${0.03+Math.random()*0.05});white-space:nowrap;animation:scrollUp ${15+Math.random()*20}s linear infinite;animation-delay:${Math.random()*15}s;top:100%;`;
        c.appendChild(d);
    }
}
const style = document.createElement('style');
style.textContent = `@keyframes scrollUp{0%{transform:translateY(0);opacity:0}5%{opacity:1}90%{opacity:1}100%{transform:translateY(-120vh);opacity:0}}`;
document.head.appendChild(style);
initLogBackground();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
