<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Lab - {% block title %}Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background:#0a0e14;color:#e5e7eb;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;">

<canvas id="fluidCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,#0d1b2a 0%,#0a0e14 70%);"></canvas>

<button id="sidebarToggle" onclick="toggleSidebar()" style="position:fixed;top:16px;left:16px;z-index:1001;background:rgba(17,24,39,0.7);border:1px solid #374151;color:#9ca3af;width:40px;height:40px;border-radius:10px;cursor:pointer;transition:.2s;">
    <i class="bi bi-three-dots-vertical"></i>
</button>

<div id="sidebar" style="position:fixed;top:0;left:-280px;width:260px;height:100%;z-index:1002;background:rgba(13,17,23,0.98);border-right:1px solid #1f2937;padding:20px;overflow-y:auto;transition:.3s;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="mb-0 text-primary"><i class="bi bi-shield-shaded me-2"></i>SOC Lab</h6>
        <button class="btn btn-sm text-secondary" onclick="toggleSidebar()"><i class="bi bi-x-lg"></i></button>
    </div>
    <hr class="text-secondary">
    <a href="/" class="d-block py-2 px-2 rounded text-decoration-none text-light" style="transition:.2s;" onmouseover="this.style.background='#1f2937'" onmouseout="this.style.background='transparent'"><i class="bi bi-house-door me-2"></i>Dashboard</a>
    <div class="mt-3 mb-1 px-2"><small class="text-secondary">CURRICULUM (25 TOPICS)</small></div>
    {% for t in CURRICULUM %}
    <a href="/topic/{{ t.id }}" class="d-block py-2 px-2 mb-1 rounded text-decoration-none small {% if topic is defined and topic.id == t.id %}text-primary fw-bold{% else %}text-light{% endif %}" style="transition:.2s;" onmouseover="this.style.background='#1f2937'" onmouseout="this.style.background='transparent'">
        <i class="{{ t.icon }} me-2 text-{{ t.color }}" style="font-size:0.75rem;"></i>{{ t.title }}
    </a>
    {% endfor %}
</div>

<div id="sidebarOverlay" onclick="toggleSidebar()" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;display:none;background:rgba(0,0,0,0.5);"></div>

<a href="https://github.com/socbymoz" target="_blank" class="text-decoration-none" style="position:fixed;bottom:16px;right:16px;z-index:1000;background:rgba(17,24,39,0.7);border:1px solid #374151;color:#9ca3af;padding:8px 14px;border-radius:20px;font-size:0.8rem;transition:.2s;" onmouseover="this.style.borderColor='#0d6efd';this.style.color='#0d6efd'" onmouseout="this.style.borderColor='#374151';this.style.color='#9ca3af'">
    <i class="bi bi-github me-1"></i>Built by socbymoz
</a>

<div class="main-content" style="position:relative;z-index:1;padding:20px;max-width:900px;margin:0 auto;">
    {% block content %}{% endblock %}
</div>

<style>
canvas { display: block; }
</style>
<script>
function toggleSidebar() {
    const s = document.getElementById('sidebar');
    const o = document.getElementById('sidebarOverlay');
    if (s.style.left === '0px') {
        s.style.left = '-280px';
        o.style.display = 'none';
    } else {
        s.style.left = '0px';
        o.style.display = 'block';
    }
}

// Digital rain live wallpaper — hex/code characters falling in blue-cyan-purple
(function() {
    const canvas = document.getElementById('fluidCanvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    const FONT = 14;
    const COL_WIDTH = FONT * 0.85;
    
    const chars = '0123456789ABCDEFabcdef<>{}[]|&^%$#@!*+-/=~_:;01アイウエオカキクケコサシスセソタチツテトナニヌネノ';
    const streams = [];
    const COLORS = [
        [0, 180, 255],   // cyan
        [50, 150, 255],  // blue
        [0, 220, 200],   // teal
        [100, 120, 255], // periwinkle
        [150, 80, 220],  // purple
        [0, 200, 255],   // bright cyan
    ];
    
    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        const count = Math.floor(W / (COL_WIDTH + 4)) + 1;
        while (streams.length < count) {
            streams.push(createStream(streams.length));
        }
        while (streams.length > count) streams.pop();
    }
    
    function createStream(idx) {
        const len = 8 + Math.floor(Math.random() * 25);
        const start = -Math.random() * H * 2;
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];
        return {
            x: idx * (COL_WIDTH + 4) + Math.random() * 4,
            y: start,
            speed: 1.5 + Math.random() * 4,
            length: len,
            chars: [],
            color: color,
            opacity: 0.15 + Math.random() * 0.35,
            flicker: Math.random() * 100,
        };
    }
    
    function drawStream(s, time) {
        const fadeOpacity = s.opacity * (1 - Math.max(0, s.y / H) * 0.6);
        if (fadeOpacity < 0.01) return;
        
        for (let i = 0; i < s.length; i++) {
            const cy = s.y - i * FONT;
            if (cy < -FONT || cy > H + FONT) continue;
            
            // Generate character if needed
            if (!s.chars[i]) s.chars[i] = chars[Math.floor(Math.random() * chars.length)];
            
            const distFromTop = i / s.length;
            const alpha = fadeOpacity * (1 - distFromTop) * 0.8;
            if (alpha < 0.01) continue;
            
            // Lead character is brightest
            const isLead = i === 0;
            const [r, g, b] = s.color;
            
            if (isLead) {
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
            } else if (distFromTop < 0.3) {
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
            } else if (distFromTop < 0.6) {
                ctx.fillStyle = `rgba(${r*0.6}, ${g*0.6}, ${b*0.7}, ${alpha * 0.6})`;
            } else {
                ctx.fillStyle = `rgba(${r*0.3}, ${g*0.3}, ${b*0.4}, ${alpha * 0.3})`;
            }
            
            ctx.fillText(s.chars[i], s.x, cy);
            
            // Randomly change char
            if (Math.random() < 0.03 + (isLead ? 0.05 : 0)) {
                s.chars[i] = chars[Math.floor(Math.random() * chars.length)];
            }
        }
    }
    
    let lastTime = 0;
    const BG_BASE = 'rgba(10, 14, 20, 0.08)'; // trailing effect
    
    function step(time) {
        const dt = Math.min((time - lastTime) / 16, 3);
        lastTime = time;
        
        // Fade trail effect instead of clear
        ctx.fillStyle = 'rgba(10, 14, 20, 0.15)';
        ctx.fillRect(0, 0, W, H);
        
        ctx.font = `bold ${FONT}px 'Courier New', monospace`;
        ctx.textBaseline = 'top';
        
        for (let i = 0; i < streams.length; i++) {
            const s = streams[i];
            s.y += s.speed * dt;
            if (s.y > H + s.length * FONT) {
                streams[i] = createStream(i);
                streams[i].y = -Math.random() * H * 0.5;
            }
            drawStream(s, time);
        }
        
        requestAnimationFrame(step);
    }
    
    resize();
    window.addEventListener('resize', resize);
    requestAnimationFrame(step);
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
