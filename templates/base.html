<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Lab - {% block title %}Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background:#0a0e14;color:#e5e7eb;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;">

<canvas id="fluidCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,#0d1b2a 0%,#0a0e14 70%);"></canvas>

<button id="sidebarToggle" onclick="toggleSidebar()" style="position:fixed;top:16px;left:16px;z-index:1001;background:rgba(17,24,39,0.7);border:1px solid #374151;color:#9ca3af;width:40px;height:40px;border-radius:10px;cursor:pointer;transition:.2s;">
    <i class="bi bi-three-dots-vertical"></i>
</button>

<div id="sidebar" style="position:fixed;top:0;left:-280px;width:260px;height:100%;z-index:1002;background:rgba(13,17,23,0.98);border-right:1px solid #1f2937;padding:20px;overflow-y:auto;transition:.3s;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="mb-0 text-primary"><i class="bi bi-shield-shaded me-2"></i>SOC Lab</h6>
        <button class="btn btn-sm text-secondary" onclick="toggleSidebar()"><i class="bi bi-x-lg"></i></button>
    </div>
    <hr class="text-secondary">
    <a href="/" class="d-block py-2 px-2 rounded text-decoration-none text-light" style="transition:.2s;" onmouseover="this.style.background='#1f2937'" onmouseout="this.style.background='transparent'"><i class="bi bi-house-door me-2"></i>Dashboard</a>
    <div class="mt-3 mb-1 px-2"><small class="text-secondary">CURRICULUM (25 TOPICS)</small></div>
    {% for t in CURRICULUM %}
    <a href="/topic/{{ t.id }}" class="d-block py-2 px-2 mb-1 rounded text-decoration-none small {% if topic is defined and topic.id == t.id %}text-primary fw-bold{% else %}text-light{% endif %}" style="transition:.2s;" onmouseover="this.style.background='#1f2937'" onmouseout="this.style.background='transparent'">
        <i class="{{ t.icon }} me-2 text-{{ t.color }}" style="font-size:0.75rem;"></i>{{ t.title }}
    </a>
    {% endfor %}
    <hr class="text-secondary">
    <a href="https://github.com/socbymoz" target="_blank" class="d-block py-2 px-2 rounded text-decoration-none text-secondary small" style="transition:.2s;" onmouseover="this.style.background='#1f2937'" onmouseout="this.style.background='transparent'">
        <i class="bi bi-github me-2"></i>Built by socbymoz
    </a>
</div>

<div id="sidebarOverlay" onclick="toggleSidebar()" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;display:none;background:rgba(0,0,0,0.5);"></div>

<div class="main-content" style="position:relative;z-index:1;padding:20px;max-width:900px;margin:0 auto;">
    {% block content %}{% endblock %}
</div>

<style>
canvas { display: block; }
</style>
<script>
function toggleSidebar() {
    const s = document.getElementById('sidebar');
    const o = document.getElementById('sidebarOverlay');
    if (s.style.left === '0px') {
        s.style.left = '-280px';
        o.style.display = 'none';
    } else {
        s.style.left = '0px';
        o.style.display = 'block';
    }
}

// Canvas fluid simulation based on mouse movement
(function() {
    const canvas = document.getElementById('fluidCanvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    const RES = 120;
    let cols, rows;
    let velX, velY, dens, press, div;
    
    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cols = Math.ceil(W / RES) + 1;
        rows = Math.ceil(H / RES) + 1;
        const size = cols * rows;
        velX = new Float32Array(size);
        velY = new Float32Array(size);
        dens = new Float32Array(size);
        press = new Float32Array(size);
        div = new Float32Array(size);
    }
    
    function idx(x, y) { return x + y * cols; }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
    
    function addDensity(x, y, amount) {
        const gx = Math.floor(x / RES);
        const gy = Math.floor(y / RES);
        if (gx < 0 || gx >= cols || gy < 0 || gy >= rows) return;
        dens[idx(gx, gy)] += amount;
    }
    
    function addVelocity(x, y, ax, ay) {
        const gx = Math.floor(x / RES);
        const gy = Math.floor(y / RES);
        if (gx < 0 || gx >= cols || gy < 0 || gy >= rows) return;
        const i = idx(gx, gy);
        velX[i] += ax;
        velY[i] += ay;
    }
    
    function diffuse(b, x, x0, dt) {
        const a = dt * 0.1 * cols * rows;
        for (let k = 0; k < 8; k++) {
            for (let j = 1; j < rows - 1; j++) {
                for (let i = 1; i < cols - 1; i++) {
                    const n = idx(i, j);
                    x[n] = (x0[n] + a * (x[idx(i-1,j)] + x[idx(i+1,j)] + x[idx(i,j-1)] + x[idx(i,j+1)])) / (1 + 4 * a);
                }
            }
            setBoundary(b, x);
        }
    }
    
    function advect(b, d, d0, velX, velY, dt) {
        const dt0 = dt * Math.max(cols, rows);
        for (let j = 1; j < rows - 1; j++) {
            for (let i = 1; i < cols - 1; i++) {
                const n = idx(i, j);
                const x = i - dt0 * velX[n];
                const y = j - dt0 * velY[n];
                const xi = clamp(x, 0.5, cols - 1.5);
                const yi = clamp(y, 0.5, rows - 1.5);
                const xf = Math.floor(xi);
                const yf = Math.floor(yi);
                const xfrac = xi - xf;
                const yfrac = yi - yf;
                const i00 = idx(xf, yf);
                const i10 = idx(xf+1, yf);
                const i01 = idx(xf, yf+1);
                const i11 = idx(xf+1, yf+1);
                d[n] = (1-xfrac)*(1-yfrac)*d0[i00] + xfrac*(1-yfrac)*d0[i10] + (1-xfrac)*yfrac*d0[i01] + xfrac*yfrac*d0[i11];
            }
        }
        setBoundary(b, d);
    }
    
    function setBoundary(b, x) {
        for (let i = 1; i < cols - 1; i++) {
            x[idx(i,0)] = b === 2 ? -x[idx(i,1)] : x[idx(i,1)];
            x[idx(i,rows-1)] = b === 2 ? -x[idx(i,rows-2)] : x[idx(i,rows-2)];
        }
        for (let j = 1; j < rows - 1; j++) {
            x[idx(0,j)] = b === 1 ? -x[idx(1,j)] : x[idx(1,j)];
            x[idx(cols-1,j)] = b === 1 ? -x[idx(cols-2,j)] : x[idx(cols-2,j)];
        }
        x[idx(0,0)] = (x[idx(1,0)] + x[idx(0,1)]) * 0.5;
        x[idx(cols-1,0)] = (x[idx(cols-2,0)] + x[idx(cols-1,1)]) * 0.5;
        x[idx(0,rows-1)] = (x[idx(1,rows-1)] + x[idx(0,rows-2)]) * 0.5;
        x[idx(cols-1,rows-1)] = (x[idx(cols-2,rows-1)] + x[idx(cols-1,rows-2)]) * 0.5;
    }
    
    function project(velX, velY, press, div) {
        for (let j = 1; j < rows - 1; j++) {
            for (let i = 1; i < cols - 1; i++) {
                const n = idx(i, j);
                div[n] = (velX[idx(i+1,j)] - velX[idx(i-1,j)] + velY[idx(i,j+1)] - velY[idx(i,j-1)]) * -0.5 / Math.max(cols, rows);
                press[n] = 0;
            }
        }
        setBoundary(0, div);
        setBoundary(0, press);
        for (let k = 0; k < 20; k++) {
            for (let j = 1; j < rows - 1; j++) {
                for (let i = 1; i < cols - 1; i++) {
                    const n = idx(i, j);
                    press[n] = (div[n] + press[idx(i-1,j)] + press[idx(i+1,j)] + press[idx(i,j-1)] + press[idx(i,j+1)]) / 4;
                }
            }
            setBoundary(0, press);
        }
        for (let j = 1; j < rows - 1; j++) {
            for (let i = 1; i < cols - 1; i++) {
                const n = idx(i, j);
                velX[n] -= 0.5 * (press[idx(i+1,j)] - press[idx(i-1,j)]) * Math.max(cols, rows);
                velY[n] -= 0.5 * (press[idx(i,j+1)] - press[idx(i,j-1)]) * Math.max(cols, rows);
            }
        }
        setBoundary(1, velX);
        setBoundary(2, velY);
    }
    
    let mouseX = -1000, mouseY = -1000;
    let prevMouseX = -1000, prevMouseY = -1000;
    let mouseActive = false;
    
    window.addEventListener('mousemove', e => {
        prevMouseX = mouseX;
        prevMouseY = mouseY;
        mouseX = e.clientX;
        mouseY = e.clientY;
        mouseActive = true;
    });
    
    window.addEventListener('touchmove', e => {
        if (e.touches.length > 0) {
            prevMouseX = mouseX;
            prevMouseY = mouseY;
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            mouseActive = true;
        }
    }, { passive: true });
    
    let lastTime = 0;
    function step(time) {
        const dt = Math.min((time - lastTime) / 1000, 0.05);
        lastTime = time;
        
        // Mouse interaction
        if (mouseActive) {
            const dx = mouseX - prevMouseX;
            const dy = mouseY - prevMouseY;
            const speed = Math.sqrt(dx*dx + dy*dy);
            if (speed > 2) {
                addDensity(mouseX, mouseY, 8);
                addVelocity(mouseX, mouseY, dx * 0.5, dy * 0.5);
            }
            mouseActive = false;
        }
        
        // Diffuse velocity
        diffuse(1, velX, velX, dt);
        diffuse(2, velY, velY, dt);
        project(velX, velY, press, div);
        
        // Advect velocity
        const velX0 = new Float32Array(velX);
        const velY0 = new Float32Array(velY);
        advect(1, velX, velX0, velX0, velY0, dt);
        advect(2, velY, velY0, velX0, velY0, dt);
        project(velX, velY, press, div);
        
        // Advect density
        const dens0 = new Float32Array(dens);
        advect(0, dens, dens0, velX, velY, dt);
        
        // Dissipate
        for (let i = 0; i < dens.length; i++) {
            dens[i] *= 0.985;
        }
        
        render();
        requestAnimationFrame(step);
    }
    
    function render() {
        ctx.clearRect(0, 0, W, H);
        
        // Color palette: dark bg with cyan/blue fluid trails
        const palette = [
            [0.05, 0.22, 0.45],   // dark blue
            [0.0, 0.45, 0.7],     // medium blue
            [0.0, 0.7, 0.85],     // cyan
            [0.1, 0.85, 0.75],    // teal
            [0.3, 0.2, 0.6],      // purple
        ];
        
        for (let j = 0; j < rows; j++) {
            for (let i = 0; i < cols; i++) {
                const d = dens[idx(i, j)];
                if (d < 0.02) continue;
                
                const x = i * RES;
                const y = j * RES;
                const w = RES + 1;
                const h = RES + 1;
                const intensity = Math.min(d * 0.15, 1);
                
                // Pick color from palette based on position
                const pi = (Math.sin(i * 0.3 + j * 0.2) * 0.5 + 0.5) * (palette.length - 1);
                const pIdx = Math.floor(pi);
                const pFrac = pi - pIdx;
                const c0 = palette[Math.min(pIdx, palette.length - 1)];
                const c1 = palette[Math.min(pIdx + 1, palette.length - 1)];
                const r = lerp(c0[0], c1[0], pFrac);
                const g = lerp(c0[1], c1[1], pFrac);
                const b = lerp(c0[2], c1[2], pFrac);
                
                ctx.fillStyle = `rgba(${r*255|0},${g*255|0},${b*255|0},${intensity * 0.4})`;
                ctx.fillRect(x, y, w, h);
            }
        }
    }
    
    resize();
    requestAnimationFrame(step);
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
