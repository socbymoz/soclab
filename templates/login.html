<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Log Lab - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        body {
            background: #0a0e14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #logBackground {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 50%, #0d1b2a 0%, #0a0e14 70%);
        }
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: fadeInUp 0.8s ease-out;
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .login-card h1 { color: #0d6efd; font-weight: 700; }
        .login-card p { color: #9ca3af; }
        .form-control {
            background: #1a1d23;
            border: 1px solid #374151;
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.2);
        }
        .btn-login {
            background: #0d6efd;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            transition: 0.2s;
        }
        .btn-login:hover { background: #0b5ed7; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div id="logBackground"></div>

    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-shield-shaded display-5 text-primary"></i>
            <h1 class="mt-2">SOC Log Lab</h1>
            <p>Sign in to start your investigation training</p>
        </div>
        <form method="POST" action="/">
            <div class="mb-3">
                <label class="form-label text-secondary">Your Name / Call Sign</label>
                <input type="text" class="form-control" name="name" placeholder="e.g. Analyst-01" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-login">
                <i class="bi bi-shield-check me-2"></i>Enter Lab
            </button>
        </form>
        <div class="text-center mt-3">
            <small class="text-secondary">No password required. Just sign in to track your progress.</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
