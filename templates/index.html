{% extends "base.html" %}
{% block title %}Welcome{% endblock %}
{% block content %}
<div class="row min-vh-100 align-items-center justify-content-center">
    <div class="col-12 text-center">
        <div class="welcome-card">
            <div class="welcome-icon mb-3">
                <i class="bi {{ icon }} display-1 text-primary"></i>
            </div>
            <h1 class="display-4 fw-bold text-white mb-2">{{ greeting }}, Analyst</h1>
            <p class="lead text-muted mb-4">SOC Log Analysis Lab</p>
            <p class="text-secondary">Ready to investigate? Open the menu to begin.</p>
        </div>
    </div>
</div>
{% endblock %}
