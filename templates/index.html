{% extends "base.html" %}
{% block title %}Welcome{% endblock %}
{% block content %}
<div class="row min-vh-100 align-items-center justify-content-center">
    <div class="col-12 text-center">
        <div class="welcome-card">
            <div class="welcome-icon mb-3">
                <i class="bi {{ icon }} display-1 text-primary"></i>
            </div>
            <h1 class="display-4 fw-bold text-white mb-2">{{ greeting }}, {{ user_name }}</h1>
            <p class="lead text-muted mb-4">SOC Log Analysis Lab</p>
            <a href="/logs" class="btn btn-primary btn-lg px-5">
                <i class="bi bi-shield-check me-2"></i>Start Lab
            </a>
            <div class="mt-3">
                <small class="text-secondary">Follow the SOC process: Logs → Alert → Triage → Investigation → Response → Recovery → Report → Improve</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
