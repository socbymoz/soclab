{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="text-center py-5">
    <i class="bi bi-shield-shaded display-3 text-primary"></i>
    <h1 class="mt-3 fw-bold"><span class="text-primary">{{ greeting }}</span></h1>
    <p class="text-secondary" style="max-width:500px;margin:8px auto;">
        Welcome to the <strong>SOC Lab</strong> — your hands-on guide to Security Operations Center analysis.
    </p>
    <a href="https://github.com/socbymoz" target="_blank" class="d-inline-flex align-items-center gap-2 text-secondary text-decoration-none border border-secondary rounded-pill px-4 py-2 mt-2" style="transition:.2s;" onmouseover="this.style.borderColor='#0d6efd';this.style.color='#0d6efd'" onmouseout="this.style.borderColor='#374151';this.style.color='#9ca3af'">
        <i class="bi bi-github"></i> Built by socbymoz <i class="bi bi-box-arrow-up-right" style="font-size:0.7rem;"></i>
    </a>
</div>


{% endblock %}
